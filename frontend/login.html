<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLeads | Login</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(0, 245, 212, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 42, 133, 0.02) 0%, transparent 60%);
            background-attachment: fixed;
        }
        body.dark-theme {
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(168, 85, 247, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(0, 245, 212, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 42, 133, 0.03) 0%, transparent 60%);
        }
        .login-card {
            background-color: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 3.5rem;
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border-color);
            animation: cardFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 850;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--accent-color), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            justify-content: center;
        }
        .login-logo i, .login-logo svg {
            stroke: var(--accent-color);
            filter: drop-shadow(0 0 8px var(--accent-glow));
            width: 32px;
            height: 32px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 0.85rem 1.1rem;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background-color: rgba(139, 92, 246, 0.02);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        body.dark-theme .form-control {
            background-color: rgba(0, 0, 0, 0.2);
        }
        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background-color: var(--surface-color);
        }
        .btn-block {
            width: 100%;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .error-message {
            color: var(--hot-color);
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            text-align: center;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="login-card">
        <div class="login-logo">
            <i data-lucide="zap"></i>
            MyLeads
        </div>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Sign in to access leads</p>
        
        <div id="error-message" class="error-message">Invalid credentials</div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                Sign In
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();
        
        // Auto-apply theme from local storage
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.remove('dark-theme');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            
            // Auto-detect backend URL for local dev vs Vercel
            let apiUrl = '/api/login';
            if (window.location.protocol === 'file:' || 
               ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '5000')) {
                apiUrl = 'http://127.0.0.1:5000/api/login';
            }

            
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    if (window.location.protocol === 'file:' || 
                       ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '5000')) {
                        window.location.href = 'index.html';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } else {
                    errorMsg.textContent = data.message || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Is the backend running?';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
